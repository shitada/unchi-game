<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="poop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Radial sparkle lines -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.3">
    <line x1="90" y1="20" x2="90" y2="8"/>
    <line x1="130" y1="30" x2="140" y2="20"/>
    <line x1="150" y1="60" x2="163" y2="55"/>
    <line x1="50" y1="30" x2="40" y2="20"/>
    <line x1="30" y1="60" x2="17" y2="55"/>
  </g>
  <!-- Poop body - 3 tier coil -->
  <!-- Bottom tier -->
  <ellipse cx="90" cy="138" rx="48" ry="18" fill="url(#poop)"/>
  <!-- Middle tier -->
  <ellipse cx="90" cy="112" rx="38" ry="16" fill="url(#poop)"/>
  <!-- Top tier -->
  <ellipse cx="90" cy="90" rx="28" ry="14" fill="url(#poop)"/>
  <!-- Tip -->
  <ellipse cx="90" cy="72" rx="12" ry="10" fill="url(#poop)"/>
  <!-- Shine highlight -->
  <ellipse cx="78" cy="100" rx="18" ry="30" fill="url(#shine)"/>
  <!-- Eyes -->
  <circle cx="78" cy="108" r="5" fill="#fff"/>
  <circle cx="102" cy="108" r="5" fill="#fff"/>
  <circle cx="79" cy="107" r="2.5" fill="#333"/>
  <circle cx="103" cy="107" r="2.5" fill="#333"/>
  <!-- Eye sparkle -->
  <circle cx="80.5" cy="105.5" r="1" fill="#fff"/>
  <circle cx="104.5" cy="105.5" r="1" fill="#fff"/>
  <!-- Smile -->
  <path d="M80 120 Q90 132 100 120" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="70" cy="120" rx="6" ry="4" fill="rgba(255,150,150,0.4)"/>
  <ellipse cx="110" cy="120" rx="6" ry="4" fill="rgba(255,150,150,0.4)"/>
  <!-- Title text -->
  <text x="90" y="172" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" fill="#FFD700">うんちゲーム</text>
</svg>
